<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XP Basketball League — The League OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SECTION: DESIGN TOKENS
   ============================================================ */
:root{
  --bg:#12151A; --surface:#1B1F26; --surface-alt:#232833; --surface-raised:#2A303B; --line:#323847;
  --chalk:#F3F1E9; --chalk-dim:#9BA1AE; --chalk-faint:#666D7C;
  --wood:#CB8A4C; --wood-dim:#8B5A2B; --xp:#2FDD9B; --xp-dim:#1B7E58;
  --fan:#E8B84B; --danger:#E85D4A; --info:#4AA3E8;
  --font-display:'Anton','Bebas Neue',sans-serif; --font-heading:'Bebas Neue',sans-serif;
  --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --radius-sm:6px; --radius-md:12px; --radius-lg:20px; --sidebar-w:236px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg); color:var(--chalk); font-family:var(--font-body); min-height:100vh; -webkit-font-smoothing:antialiased;}
a{color:inherit;} button{font-family:inherit;} ::selection{background:var(--xp); color:#0A0C0F;}
.court-texture{background-image:radial-gradient(circle at 15% 120%, rgba(203,138,76,0.14) 0, transparent 45%), radial-gradient(circle at 85% -20%, rgba(47,221,155,0.10) 0, transparent 40%);}

/* ---------- Shell ---------- */
#app-shell{display:flex; min-height:100vh;}
#sidebar{width:var(--sidebar-w); flex:0 0 var(--sidebar-w); background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column; position:sticky; top:0; height:100vh;}
.brand{padding:22px 20px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;}
.brand-mark{width:34px; height:34px; border-radius:50%; background:conic-gradient(from 220deg, var(--wood), var(--xp), var(--wood)); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:15px; color:#0A0C0F; flex:0 0 34px;}
.brand-text{font-family:var(--font-heading); letter-spacing:0.5px; line-height:1;}
.brand-text b{display:block; font-size:18px; color:var(--chalk);}
.brand-text span{display:block; font-size:10.5px; color:var(--chalk-faint); letter-spacing:2px; text-transform:uppercase; margin-top:2px;}
#nav{flex:1; padding:12px 10px; overflow-y:auto;}
.nav-group-label{font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--chalk-faint); padding:12px 10px 5px;}
.nav-item{display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:var(--radius-sm); cursor:pointer; color:var(--chalk-dim); font-size:13.5px; font-weight:500; border:1px solid transparent; margin-bottom:2px; transition:background .15s, color .15s;}
.nav-item:hover{background:var(--surface-alt); color:var(--chalk);}
.nav-item.active{background:var(--surface-alt); color:var(--chalk); border-color:var(--line);}
.nav-item.active .nav-ic{color:var(--xp);}
.nav-ic{width:18px; text-align:center; font-size:14px;}
.sidebar-foot{padding:14px; border-top:1px solid var(--line);}
.role-pill{display:flex; align-items:center; gap:9px; background:var(--surface-alt); border:1px solid var(--line); border-radius:var(--radius-md); padding:9px 10px; cursor:pointer;}
.role-pill:hover{border-color:var(--wood);}
.role-avatar{width:30px; height:30px; border-radius:50%; background:var(--surface-raised); display:flex; align-items:center; justify-content:center; font-size:15px; flex:0 0 30px;}
.role-meta{line-height:1.2; overflow:hidden;}
.role-meta b{font-size:13px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.role-meta span{font-size:11px; color:var(--chalk-faint); text-transform:uppercase; letter-spacing:0.5px;}
#main{flex:1; min-width:0; display:flex; flex-direction:column;}
#topbar{position:sticky; top:0; z-index:5; background:rgba(18,21,26,0.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;}
.page-title{font-family:var(--font-heading); font-size:25px; letter-spacing:0.5px;}
.page-sub{font-size:12.5px; color:var(--chalk-faint); margin-top:1px;}
.quick-stats{display:flex; gap:10px; flex-wrap:wrap;}
.chip{display:flex; align-items:center; gap:7px; background:var(--surface-alt); border:1px solid var(--line); padding:6px 12px; border-radius:999px; font-size:12.5px; font-family:var(--font-mono); white-space:nowrap;}
.chip b{color:var(--chalk); font-weight:700;}
.chip .dot{width:7px; height:7px; border-radius:50%;}
#content{padding:26px 28px 60px; flex:1;}

/* ---------- Shared ---------- */
.grid{display:grid; gap:18px;}
.grid-2{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(3,1fr);} .grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:720px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:20px;}
.card-title{font-family:var(--font-heading); font-size:17px; letter-spacing:0.4px; margin:0 0 4px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
.card-desc{font-size:12.5px; color:var(--chalk-faint); margin:0 0 14px;}
.section-head{display:flex; align-items:flex-end; justify-content:space-between; margin:34px 0 16px; flex-wrap:wrap; gap:10px;}
.section-head:first-child{margin-top:0;}
.section-head h2{font-family:var(--font-heading); font-size:20px; letter-spacing:0.4px; margin:0;}
.section-head p{font-size:12.5px; color:var(--chalk-faint); margin:2px 0 0;}
.btn{font-family:var(--font-body); font-weight:600; font-size:13px; border-radius:var(--radius-sm); border:1px solid var(--line); background:var(--surface-alt); color:var(--chalk); padding:9px 16px; cursor:pointer; transition:transform .1s, border-color .15s, background .15s; display:inline-flex; align-items:center; gap:7px;}
.btn:hover{border-color:var(--wood); transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-primary{background:var(--xp); color:#0A0C0F; border-color:var(--xp);}
.btn-primary:hover{border-color:var(--xp); filter:brightness(1.08);}
.btn-wood{background:var(--wood); color:#1A1200; border-color:var(--wood);}
.btn-sm{padding:6px 11px; font-size:12px;}
.btn-block{width:100%; justify-content:center;}
.btn[disabled]{opacity:0.45; cursor:not-allowed;}
.bar{height:8px; border-radius:999px; background:var(--surface-raised); overflow:hidden; position:relative;}
.bar > i{display:block; height:100%; border-radius:999px; background:var(--xp); transition:width .5s ease;}
.bar.wood > i{background:var(--wood);} .bar.fan > i{background:var(--fan);} .bar.mini{height:5px;}
.badge-tag{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:3px 8px; border-radius:999px; background:var(--surface-raised); color:var(--chalk-dim); border:1px solid var(--line); display:inline-block;}
.pill-pending{background:rgba(232,184,75,0.14); color:var(--fan); border:1px solid var(--fan);}
.pill-approved{background:rgba(47,221,155,0.12); color:var(--xp); border:1px solid var(--xp);}
.conf-high{color:var(--xp); border-color:var(--xp);}
.conf-medium{color:var(--fan); border-color:var(--fan);}
.conf-low{color:var(--danger); border-color:var(--danger);}
.tabs{display:flex; gap:6px; background:var(--surface-alt); padding:4px; border-radius:999px; border:1px solid var(--line); width:max-content; flex-wrap:wrap;}
.tab{padding:7px 15px; border-radius:999px; font-size:12.5px; font-weight:600; cursor:pointer; color:var(--chalk-dim); white-space:nowrap;}
.tab.active{background:var(--surface-raised); color:var(--chalk);}
.chip-filter{padding:5px 12px; border-radius:999px; font-size:11.5px; font-weight:600; cursor:pointer; color:var(--chalk-dim); background:var(--surface-alt); border:1px solid var(--line);}
.chip-filter.active{color:var(--chalk); border-color:var(--xp);}
input,select,textarea{width:100%; background:var(--surface-alt); border:1px solid var(--line); color:var(--chalk); border-radius:var(--radius-sm); padding:9px 11px; font-size:13.5px; font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--xp); outline-offset:1px; border-color:var(--xp);}
label{font-size:12px; color:var(--chalk-faint); display:block; margin:0 0 5px; text-transform:uppercase; letter-spacing:0.4px;}
.field{margin-bottom:14px;}
.empty{border:1.5px dashed var(--line); border-radius:var(--radius-lg); padding:34px 20px; text-align:center; color:var(--chalk-faint); font-size:13.5px;}
.empty b{display:block; color:var(--chalk); font-family:var(--font-heading); font-size:17px; margin-bottom:5px; letter-spacing:0.3px;}
#toast-host{position:fixed; bottom:22px; right:22px; z-index:999; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--surface-raised); border:1px solid var(--xp); color:var(--chalk); padding:11px 16px; border-radius:var(--radius-md); font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,0.4); animation:toastIn .25s ease; max-width:320px;}
@keyframes toastIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Onboarding ---------- */
#onboarding{min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; padding:40px 20px;}
.ob-card{max-width:740px; width:100%; text-align:center; position:relative; z-index:1;}
.ob-eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:3px; color:var(--xp); text-transform:uppercase; margin-bottom:14px;}
.ob-title{font-family:var(--font-display); font-size:clamp(34px,6vw,56px); line-height:1.03; margin:0 0 14px;}
.ob-title span{color:var(--wood);}
.ob-sub{color:var(--chalk-dim); font-size:15px; max-width:540px; margin:0 auto 34px; line-height:1.5;}
.role-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; text-align:left;}
@media(max-width:640px){.role-grid{grid-template-columns:repeat(2,1fr);}}
.role-card{background:var(--surface); border:1.5px solid var(--line); border-radius:var(--radius-lg); padding:18px 14px; cursor:pointer; transition:border-color .15s, transform .15s;}
.role-card:hover{border-color:var(--xp); transform:translateY(-3px);}
.role-card .ric{font-size:26px; margin-bottom:10px;}
.role-card b{font-family:var(--font-heading); font-size:16px; display:block; letter-spacing:0.3px;}
.role-card p{font-size:11.5px; color:var(--chalk-faint); margin:5px 0 0; line-height:1.4;}

/* ---------- Dashboard ---------- */
.hero{border-radius:var(--radius-lg); border:1px solid var(--line); padding:30px; position:relative; overflow:hidden; margin-bottom:26px;}
.hero-title{font-family:var(--font-display); font-size:clamp(26px,4vw,38px); line-height:1.05; margin:0 0 8px; position:relative;}
.hero-title .accent{color:var(--xp);}
.hero-text{color:var(--chalk-dim); font-size:13.5px; max-width:560px; position:relative;}
.hero-cta{margin-top:18px; display:flex; gap:10px; position:relative; flex-wrap:wrap;}
.pathway-row{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
.pathway-row:last-child{margin-bottom:0;}
.pathway-label{width:110px; font-size:12.5px; font-weight:600; flex:0 0 110px;}
.pathway-pct{width:38px; text-align:right; font-family:var(--font-mono); font-size:12px; color:var(--chalk-faint); flex:0 0 38px;}
.xp-track{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line);}
.xp-track:last-child{border-bottom:none;}
.xp-track-ic{width:38px; height:38px; border-radius:10px; background:var(--surface-alt); display:flex; align-items:center; justify-content:center; font-size:17px; flex:0 0 38px;}
.xp-track-body{flex:1; min-width:0;}
.xp-track-top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
.xp-track-top b{font-family:var(--font-mono); color:var(--xp);}

/* ---------- Player / role card ---------- */
.pcard-wrap{display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap;}
.pcard{width:300px; flex:0 0 300px; border-radius:22px; padding:2px; position:relative; background:linear-gradient(160deg, var(--wood), var(--surface-raised) 40%, var(--xp)); transition:box-shadow .4s ease;}
.pcard.hot-1{box-shadow:0 0 22px 0 rgba(47,221,155,0.25);}
.pcard.hot-2{box-shadow:0 0 32px 2px rgba(47,221,155,0.4);}
.pcard.hot-3{box-shadow:0 0 46px 6px rgba(47,221,155,0.6), 0 0 70px 10px rgba(203,138,76,0.35);}
.pcard-inner{background:linear-gradient(180deg, #1A1E25, #14171D 70%); border-radius:20px; padding:20px; position:relative; overflow:hidden;}
.pcard-inner::before{content:''; position:absolute; top:-60%; left:-20%; width:140%; height:220%; background:linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%); transform:rotate(8deg);}
.pcard-top{display:flex; justify-content:space-between; align-items:flex-start;}
.pcard-lvl{font-family:var(--font-mono); font-size:11px; color:var(--chalk-faint); text-transform:uppercase; letter-spacing:1px;}
.pcard-lvl b{display:block; font-family:var(--font-display); font-size:26px; color:var(--xp); line-height:1;}
.pcard-photo{width:64px; height:64px; border-radius:50%; background:var(--surface-alt); border:2px solid var(--wood); display:flex; align-items:center; justify-content:center; font-size:30px;}
.pcard-name{font-family:var(--font-display); font-size:24px; margin:14px 0 0; letter-spacing:0.3px;}
.pcard-archetype{font-size:12px; color:var(--wood); font-weight:700; text-transform:uppercase; letter-spacing:0.6px; margin-top:2px;}
.pcard-meta{display:flex; gap:14px; margin:12px 0; font-size:11px; color:var(--chalk-faint); font-family:var(--font-mono); flex-wrap:wrap;}
.pcard-attrs{display:grid; grid-template-columns:1fr 1fr; gap:7px 14px; margin-top:14px;}
.attr-row{font-size:11px;}
.attr-row-top{display:flex; justify-content:space-between; margin-bottom:3px;}
.attr-row-top span{color:var(--chalk-dim);}
.attr-row-top b{font-family:var(--font-mono);}
.pcard-foot{display:flex; justify-content:space-between; margin-top:16px; padding-top:14px; border-top:1px solid var(--line);}
.pcard-foot .fstat{text-align:center;}
.pcard-foot .fstat b{display:block; font-family:var(--font-mono); font-size:15px; color:var(--chalk);}
.pcard-foot .fstat span{font-size:9.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--chalk-faint);}
.pcard-side{flex:1; min-width:280px; display:flex; flex-direction:column; gap:16px;}
.evidence-row{display:flex; align-items:center; gap:8px; font-size:11px; margin-top:3px;}
.evidence-row span{color:var(--chalk-faint);}

/* ---------- Teams / leaderboard / badges / training / feed ---------- */
.team-card{position:relative;}
.team-colorbar{height:5px; border-radius:4px; margin-bottom:12px;}
.team-head{display:flex; gap:12px; align-items:center;}
.team-logo{width:44px; height:44px; border-radius:12px; background:var(--surface-alt); display:flex; align-items:center; justify-content:center; font-size:22px; flex:0 0 44px; position:relative;}
.team-name{font-family:var(--font-heading); font-size:17px; letter-spacing:0.3px;}
.team-motto{font-size:11.5px; color:var(--chalk-faint); font-style:italic;}
.team-stats{display:flex; gap:16px; margin-top:14px; flex-wrap:wrap;}
.team-stats div{font-size:11px; color:var(--chalk-faint);}
.team-stats b{display:block; font-family:var(--font-mono); font-size:15px; color:var(--chalk);}
table.lb{width:100%; border-collapse:collapse; font-size:13px;}
table.lb th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--chalk-faint); padding:8px 10px; border-bottom:1px solid var(--line);}
table.lb td{padding:11px 10px; border-bottom:1px solid var(--line);}
table.lb tr:last-child td{border-bottom:none;}
.rank-num{font-family:var(--font-mono); color:var(--chalk-faint); width:24px; display:inline-block;}
.badge-card{cursor:pointer;}
.badge-head{display:flex; gap:12px; align-items:center;}
.badge-ic{width:42px; height:42px; border-radius:12px; background:var(--surface-alt); display:flex; align-items:center; justify-content:center; font-size:21px; flex:0 0 42px;}
.tier-row{display:flex; align-items:center; gap:10px; margin-top:8px; font-size:11.5px;}
.tier-row .tname{width:64px; flex:0 0 64px; color:var(--chalk-dim);}
.tier-row .tnum{width:100px; flex:0 0 100px; text-align:right; font-family:var(--font-mono); color:var(--chalk-faint);}
.tier-row.done .tname{color:var(--xp);}
.train-card .diff{margin-left:auto;}
.train-meta{display:flex; flex-wrap:wrap; gap:6px; margin:10px 0 12px;}
.video-ph{height:110px; border-radius:var(--radius-md); background:repeating-linear-gradient(135deg, var(--surface-alt), var(--surface-alt) 10px, var(--surface-raised) 10px, var(--surface-raised) 20px); display:flex; align-items:center; justify-content:center; color:var(--chalk-faint); font-size:22px; margin-bottom:12px;}
.post{display:flex; gap:12px; padding:16px 0; border-bottom:1px solid var(--line);}
.post:last-child{border-bottom:none;}
.post-avatar{width:38px; height:38px; border-radius:50%; background:var(--surface-alt); display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 38px;}
.post-body{flex:1;}
.post-name{font-weight:700; font-size:13.5px;}
.post-role{font-size:11px; color:var(--chalk-faint); margin-left:6px; text-transform:uppercase;}
.post-text{font-size:13.5px; margin:6px 0 8px; line-height:1.5; color:var(--chalk-dim);}
.post-actions{display:flex; gap:16px; font-size:12px; color:var(--chalk-faint);}
.post-actions span{cursor:pointer;}
.post-actions span:hover{color:var(--xp);}

/* ---------- Clips / minigames ---------- */
.clip-card{position:relative;}
.clip-thumb{height:100px; border-radius:var(--radius-md); background:linear-gradient(135deg, var(--surface-alt), var(--surface-raised)); display:flex; align-items:center; justify-content:center; font-size:26px; margin-bottom:10px; position:relative;}
.clip-expand{margin-top:12px; padding-top:12px; border-top:1px solid var(--line); font-size:12px; color:var(--chalk-dim); line-height:1.6;}

/* ---------- Competitions ---------- */
.comp-fee{font-family:var(--font-mono); color:var(--xp); font-weight:700;}
.slots-bar{margin:8px 0 12px;}

/* ---------- Accordion (How It Works) ---------- */
.accordion-head{cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
.accordion-chevron{color:var(--chalk-faint); font-size:13px; transition:transform .2s;}
.accordion-body{margin-top:14px; font-size:13px; color:var(--chalk-dim); line-height:1.7;}
.accordion-body ul{margin:0; padding-left:18px;}
.accordion-body li{margin-bottom:7px;}
.accordion-body h4{font-family:var(--font-heading); font-size:14px; letter-spacing:0.3px; color:var(--chalk); margin:16px 0 6px;}
.accordion-body h4:first-child{margin-top:0;}

/* ---------- Quiz ---------- */
.quiz-progress{display:flex; gap:6px; margin-bottom:22px;}
.quiz-progress i{flex:1; height:4px; border-radius:2px; background:var(--surface-raised);}
.quiz-progress i.done{background:var(--xp);}
.quiz-scenario{font-family:var(--font-heading); font-size:19px; letter-spacing:0.3px; line-height:1.3; margin:0 0 20px;}
.quiz-opt{display:block; width:100%; text-align:left; background:var(--surface-alt); border:1px solid var(--line); border-radius:var(--radius-md); padding:14px 16px; margin-bottom:10px; cursor:pointer; font-size:13.5px; color:var(--chalk);}
.quiz-opt:hover{border-color:var(--xp); background:var(--surface-raised);}
.result-arch{text-align:center; padding:10px 0 20px;}
.result-arch .ric{font-size:44px;}
.result-arch h2{font-family:var(--font-display); font-size:32px; margin:8px 0 6px;}

/* ---------- Vision ---------- */
.pillar-card{position:relative; overflow:hidden;}
.pillar-num{font-family:var(--font-display); font-size:42px; color:var(--surface-raised); position:absolute; top:8px; right:16px;}
.stat-strip{display:flex; gap:0; border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden;}
.stat-block{flex:1; padding:20px; text-align:center; border-right:1px solid var(--line);}
.stat-block:last-child{border-right:none;}
.stat-block b{display:block; font-family:var(--font-display); font-size:30px; color:var(--xp);}
.stat-block span{font-size:11px; color:var(--chalk-faint); text-transform:uppercase; letter-spacing:0.5px;}
.roadmap{display:flex; gap:0; position:relative; margin-top:10px;}
.rm-step{flex:1; text-align:center; position:relative; padding-top:22px;}
.rm-step::before{content:''; position:absolute; top:7px; left:0; right:0; height:2px; background:var(--line);}
.rm-step::after{content:''; position:absolute; top:2px; left:50%; transform:translateX(-50%); width:12px; height:12px; border-radius:50%; background:var(--surface-alt); border:2px solid var(--wood);}
.rm-step.done::after{background:var(--xp); border-color:var(--xp);}

.rm-step span{font-size:11px; color:var(--chalk-faint);}

footer.dev-note{margin-top:50px; padding:18px 22px; border:1px dashed var(--line); border-radius:var(--radius-md); font-size:12px; color:var(--chalk-faint); font-family:var(--font-mono); line-height:1.6;}
footer.dev-note b{color:var(--chalk-dim);}

@media(max-width:900px){
  #sidebar{position:fixed; left:0; top:0; z-index:20; transform:translateX(-100%); transition:transform .2s;}
  #sidebar.open{transform:translateX(0);}
  #topbar{padding:14px 16px;} #content{padding:18px 16px 50px;}
}

function showToast(msg){
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  host.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2600);
}
function pct(a,b){ return Math.max(0, Math.min(100, Math.round((a/b)*100))); }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function confClass(c){ return c==='High' ? 'conf-high' : c==='Medium' ? 'conf-medium' : 'conf-low'; }

function awardXP(track, amount){
  const t = DB.player.xpTracks[track];
  t.xp += amount;
  while (t.xp >= t.next){
    t.xp -= t.next; t.level += 1; t.next = Math.round(t.next * 1.28);
    showToast(`⬆️ ${t.label} track levelled up — now level ${t.level}!`);
  }
  showToast(`+${amount} XP · ${t.label} track (evidence recorded)`);
}

/* Combines two archetypes into a procedurally generated hybrid nickname —
   used when a quiz result is a genuine close call between two builds,
   rather than forcing a tie into one ill-fitting box. */
function generateHybridNickname(idA, idB){
  const a = ARCHETYPES[idA], b = ARCHETYPES[idB];
  const nounB = b.name.split(' ').pop();
  return `${a.adj} ${nounB}`;
}

/* Loosely maps each attribute to the closest skill tag in the training
   library, so a quiz result can point straight at relevant drills. */
const ATTR_TO_SKILL = {
  shooting:'Shooting', passing:'Basketball IQ', defence:'Defence', conditioning:'Conditioning',
  strength:'Conditioning', leadership:'Basketball IQ', communication:'Basketball IQ',
  decisionMaking:'Basketball IQ', basketballIQ:'Basketball IQ', confidence:'Shooting', consistency:'Shooting'
};
function recommendDrills(attrs){
  const skills = [...new Set(attrs.map(a=>ATTR_TO_SKILL[a]))];
  return DB.training.drills.filter(d => skills.includes(d.skill)).slice(0,4);
}

function viewQuiz(){
  if (!state.quiz) quizInit();
  const q = state.quiz;
  if (q.done){
    const sorted = Object.entries(q.scores).sort((a,b)=>b[1]-a[1]);
    const labels = attrLabels();
    const [topId, topScore] = sorted[0];
    const [secondId, secondScore] = sorted[1] || [null, 0];
    const isHybrid = secondId && topScore > 0 && secondScore >= topScore * 0.75;
    const top = ARCHETYPES[topId];
    const second = isHybrid ? ARCHETYPES[secondId] : null;
    const nickname = isHybrid ? generateHybridNickname(topId, secondId) : null;

    const displayName = isHybrid ? `"${nickname}"` : top.name;
    const displayIcon = isHybrid ? `${top.icon}${second.icon}` : top.icon;
    const displayDesc = isHybrid
      ? `A hybrid build: mostly ${top.name.toLowerCase()} (${top.desc}) with real ${second.name.toLowerCase()} tendencies too (${second.desc})`
      : top.desc;

    const emphasizeSet = [...new Set(isHybrid ? [...top.emphasize, ...second.emphasize] : top.emphasize)];
    const playerAttrs = DB.player.attributes;
    const growthAreas = Object.keys(playerAttrs)
      .filter(k => !emphasizeSet.includes(k))
      .sort((a,b) => playerAttrs[a]-playerAttrs[b])
      .slice(0,3);
    const drills = recommendDrills(emphasizeSet);
    const tips = isHybrid ? [top.tip, second.tip] : [top.tip];

    const applyBtn = isHybrid
      ? `<button class="btn btn-primary" data-action="apply-archetype" data-hybrid="1" data-arch="${topId}" data-arch-b="${secondId}" data-nickname="${esc(nickname)}">Set as my archetype</button>`
      : `<button class="btn btn-primary" data-action="apply-archetype" data-arch="${topId}">Set as my archetype</button>`;

    return `
      <div class="card">
        <div class="result-arch">
          <div class="ric">${displayIcon}</div><h2>${displayName}</h2>
          ${isHybrid ? `<div class="badge-tag" style="margin-bottom:8px;">Hybrid build</div>` : ''}
          <p class="card-desc" style="max-width:520px; margin:0 auto;">${displayDesc}</p>
        </div>
        <div class="grid grid-2">
          <div>
            <h3 class="card-title">Your top matches</h3>
            ${sorted.slice(0,4).map(([id,score]) => `<div class="xp-track-top" style="margin-top:8px;"><span>${ARCHETYPES[id].icon} ${ARCHETYPES[id].name}</span><b>${score} pts</b></div><div class="bar mini"><i style="width:${pct(score, sorted[0][1]||1)}%"></i></div>`).join('')}
          </div>
          <div>
            <h3 class="card-title">Character strengths</h3>
            ${emphasizeSet.map(a=>`<div class="badge-tag" style="margin:0 6px 6px 0;">${labels[a]}</div>`).join('')}
            <h3 class="card-title" style="margin-top:16px;">Growth areas</h3>
            ${growthAreas.map(a=>`<div class="badge-tag" style="margin:0 6px 6px 0; color:var(--danger); border-color:var(--danger);">${labels[a]}</div>`).join('')}
          </div>
        </div>

        <h3 class="card-title" style="margin-top:22px;">Training methodology — how to lean into this build</h3>
        ${tips.map(t=>`<p class="card-desc">${t}</p>`).join('')}
        ${drills.length ? `
          <div class="grid grid-2" style="margin-top:6px;">
            ${drills.map(d=>`<div class="card" style="background:var(--surface-alt);"><h3 class="card-title" style="font-size:13.5px;">${d.title} <span class="badge-tag diff">${d.difficulty}</span></h3><div class="card-desc">${d.skill} · +${d.xp} XP</div></div>`).join('')}
          </div>` : ''}

        <div style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap;">
          ${applyBtn}
          <button class="btn" data-action="restart-quiz">Retake quiz</button>
          <button class="btn" data-action="toggle-how" data-id="archlib">Browse all archetypes</button>
        </div>
        ${state.howOpen.archlib ? `
          <div class="accordion-body" style="margin-top:16px;">
            <div class="grid grid-3">
              ${Object.values(ARCHETYPES).map(a=>`<div class="card" style="background:var(--surface-alt);"><h3 class="card-title" style="font-size:13.5px;">${a.icon} ${a.name}</h3><p class="card-desc" style="margin-bottom:0;">${a.desc}</p></div>`).join('')}
            </div>
          </div>` : ''}
      </div>`;
  }
  const question = QUIZ_QUESTIONS.find(x=>x.id===q.currentQ);
  return `
    <div class="card" style="max-width:640px;">
      <div class="quiz-progress">${Array.from({length:6}).map((_,i)=>`<i class="${i<q.askedIds.length?'done':''}"></i>`).join('')}</div>
      <div class="ob-eyebrow">Scenario ${q.askedIds.length+1} of up to 6</div>
      <h2 class="quiz-scenario">${question.scenario}</h2>
      ${question.options.map((o,i) => `<button class="quiz-opt" data-action="quiz-answer" data-qid="${question.id}" data-oidx="${i}">${o.text}</button>`).join('')}
      <p class="card-desc" style="margin-top:10px;">Questions narrow toward whichever of the ${Object.keys(ARCHETYPES).length} archetypes your answers are pointing at — you likely won't see every scenario.</p>
    </div>`;
}

function viewLeaderboard(){

  if (state.lbTab === 'players'){
    const rows = [...DB.leaderboards.players].sort((a,b)=>b[state.lbSort==='fans'?'fans':'level']-a[state.lbSort==='fans'?'fans':'level']);
    tableHTML = `<table class="lb"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Archetype</th><th>Level</th><th>Fans</th></tr></thead><tbody>
      ${rows.map((r,i)=>`<tr><td class="rank-num">${i+1}</td><td>${esc(r.name)}</td><td>${esc(r.team)}</td><td>${esc(r.archetype)}</td><td>${r.level}</td><td>${r.fans.toLocaleString()}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (state.lbTab === 'teams'){
    const rows = [...DB.teams].sort((a,b)=>b[state.lbSort==='fans'?'fans':'level']-a[state.lbSort==='fans'?'fans':'level']);
    tableHTML = `<table class="lb"><thead><tr><th>#</th><th>Team</th><th>Home court</th><th>Level</th><th>Fans</th><th>Accolades</th></tr></thead><tbody>
      ${rows.map((r,i)=>`<tr><td class="rank-num">${i+1}</td><td>${esc(r.name)}</td><td>${esc(r.court)}</td><td>${r.level}</td><td>${r.fans.toLocaleString()}</td><td>${r.accolades}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (state.lbTab === 'coaches'){
    const rows = [...DB.leaderboards.coaches].sort((a,b)=>b.level-a.level);
    tableHTML = `<table class="lb"><thead><tr><th>#</th><th>Coach</th><th>Level</th><th>Athletes coached</th><th>Reputation</th></tr></thead><tbody>
      ${rows.map((r,i)=>`<tr><td class="rank-num">${i+1}</td><td>${esc(r.name)}</td><td>${r.level}</td><td>${r.athletesCoached}</td><td>${r.rep}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (state.lbTab === 'creators'){
    const rows = [...DB.leaderboards.creators].sort((a,b)=>b.fans-a.fans);
    tableHTML = `<table class="lb"><thead><tr><th>#</th><th>Creator</th><th>Level</th><th>Fans</th><th>Views</th></tr></thead><tbody>
      ${rows.map((r,i)=>`<tr><td class="rank-num">${i+1}</td><td>${esc(r.name)}</td><td>${r.level}</td><td>${r.fans.toLocaleString()}</td><td>${r.views}</td></tr>`).join('')}
    </tbody></table>`;
  } else {
    const rows = [...DB.leaderboards.officials].sort((a,b)=>b.level-a.level);
    tableHTML = `<table class="lb"><thead><tr><th>#</th><th>Official</th><th>Level</th><th>Matches officiated</th><th>Accuracy</th></tr></thead><tbody>
      ${rows.map((r,i)=>`<tr><td class="rank-num">${i+1}</td><td>${esc(r.name)}</td><td>${r.level}</td><td>${r.matchesOfficiated}</td><td>${r.accuracy}</td></tr>`).join('')}
    </tbody></table>`;
  }
  return `
    <div class="section-head"><div><h2>Leaderboard</h2><p>Every role has its own board.</p></div></div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;">

    <p style="margin-top:0;">The XP Basketball League is built so that <b style="color:var(--chalk);">no one can self-report their way to the top</b>. Every XP-earning action follows one of these rules:</p>
    <ul>
      <li><b style="color:var(--chalk);">Two-party confirmation</b> — match stats need sign-off from an opponent, teammate captain or referee before XP is granted.</li>
      <li><b style="color:var(--chalk);">Recorded drills</b> — training drills are filmed (your camera, or a coach witnessing live) and timestamped; free tier requires a witness tap-to-confirm, paid tier verifies automatically against the recording.</li>
      <li><b style="color:var(--chalk);">Multi-signal verification</b> — camera-based shot/rep tracking, ball-strike audio detection and phone motion sensors cross-check each other, so a session can't be faked from the sofa.</li>
      <li><b style="color:var(--chalk);">Geofenced check-in</b> — XP for attending an affiliated court requires your device to register inside that court's location, the same way run-tracking apps confirm a route was actually run.</li>
      <li><b style="color:var(--chalk);">Diminishing returns</b> — repeated self-reported entries in a short window earn reduced XP, to blunt spam.</li>
      <li><b style="color:var(--chalk);">Community flags &amp; review</b> — any verified member can flag a suspicious entry; league admins/officials review before anything is reversed.</li>
      <li><b style="color:var(--chalk);">Random audits</b> — fast-climbing leaderboard entries are subject to periodic evidence spot-checks, comparing self-logged trends against occasional camera-verified skill checks.</li>
      <li><b style="color:var(--chalk);">Evidence decay</b> — stale or unverified entries contribute less over time, so a single good game can't inflate a score indefinitely.</li>
    </ul>`;
  const attrBody = `
    <p style="margin-top:0;">Attributes aren't self-declared — each one is computed from weighted, verified evidence:</p>
    <ul>
      <li>Verified matches carry the most weight.</li>
      <li>Recorded or witnessed training drills carry moderate weight.</li>
      <li>Peer ratings from verified teammates and opponents carry the least weight, and are capped so no single rating can swing a score.</li>
    </ul>
    <p>Every attribute is shown as <b style="color:var(--chalk);">Top X% at your level</b> — an anonymised comparison against players at the same level and league tier, recalculated weekly — so "70 Shooting, Top 26%" always means something relative to your peers, not an arbitrary number.</p>
    <p>A <b style="color:var(--chalk);">confidence tag</b> (Low / Medium / High) shows how much verified evidence backs the figure, which rewards logging more verified reps rather than letting one big night carry an attribute.</p>`;
  return `
    <div class="section-head"><div><h2>How The XP Basketball League Works</h2><p>Everything the progression system runs on, in one place.</p></div></div>
    ${accordionPanel('xp','XP System — 5 tracks', xpBody)}
    ${accordionPanel('lp','Life Progression System — 6 pathways', lpBody)}
    ${accordionPanel('rep','Community Reputation', repBody)}
    ${accordionPanel('fan','Fan Base', fanBody)}
    ${accordionPanel('evidence','Evidence &amp; Fair Play (anti-cheat)', evidenceBody)}
    ${accordionPanel('attr','Attributes &amp; Fairness Methodology', attrBody)}`;
}

  mycard:['Your Card','Full profile, stats and archetype'],
  quiz:['Playstyle Quiz','Scenario-based archetype finder'],

function render(){
  const root = document.getElementById('root');
  if (!state.onboarded){ root.innerHTML = viewOnboarding(); return; }
  const [title, sub] = TITLES[state.view] || TITLES.dashboard;
  root.innerHTML = `<div id="app-shell">${sidebarHTML()}<div id="main">${topbarHTML(title, sub)}<div id="content">${(VIEW_FN[state.view] || viewDashboard)()}</div></div></div>`;
}

/* ---------------------------------------------------------------
   6. EVENTS
   --------------------------------------------------------------- */
function quizInit(){
  const scores = {}; Object.keys(ARCHETYPES).forEach(k=>scores[k]=0);
  state.quiz = {scores, askedIds:[], currentQ:QUIZ_QUESTIONS[0].id, done:false};
}
function quizPickNext(){
  const answered = state.quiz.askedIds;
  const remaining = QUIZ_QUESTIONS.filter(q=>!answered.includes(q.id));
  if (remaining.length===0 || answered.length>=6) return null;
  const leaders = Object.entries(state.quiz.scores).sort((a,b)=>b[1]-a[1]).slice(0,2).map(e=>e[0]);
  function relevance(q){ let s=0; q.options.forEach(o=>Object.entries(o.tags).forEach(([a,w])=>{ if(leaders.includes(a)) s+=w; })); return s; }
  remaining.sort((a,b)=>relevance(b)-relevance(a));
  return remaining[0].id;
}

document.addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  switch(action){
    case 'set-role':
      state.role = el.dataset.role; state.onboarded = true; state.view = 'dashboard';
      state.badgeCat = ROLE_META[state.role].badgeCat; state.trainTab = ROLE_META[state.role].trainTab;
      render(); showToast(`Welcome to the league, ${ROLE_META[state.role].label}!`);
      break;
    case 'nav':
      if (el.dataset.view === 'onboard-reset'){ state.onboarded = false; render(); break; }
      state.view = el.dataset.view; render();
      break;
    case 'progress-challenge': {
      const c = DB.player.activeChallenges.find(c=>c.id===el.dataset.id);
      if (c && c.progress < c.target){
        c.progress = Math.min(c.target, c.progress + Math.ceil(c.target*0.15));
        if (c.progress >= c.target){ awardXP('player', c.xp); showToast(`✅ "${c.title}" complete!`); }
        render();
      }
      break;
    }
    case 'hot-streak-up': DB.player.hotStreak = Math.min(3, DB.player.hotStreak + 1); render(); showToast('🔥 Hot streak building — card glow intensified.'); break;
    case 'hot-streak-reset': DB.player.hotStreak = 0; render(); break;
    case 'join-team': { const team = DB.teams.find(t=>t.id===el.dataset.id); showToast(`Request sent to join ${team.name} — a captain will review it.`); break; }
    case 'approve-logo': { const team = DB.teams.find(t=>t.id===el.dataset.id); team.logoStatus='approved'; showToast(`${team.name}'s logo approved.`); render(); break; }
    case 'complete-training': {
      const track = el.dataset.track;
      awardXP(track, Number(el.dataset.xp));
      if (track==='player') DB.player.clips.unshift({id:'c'+(DB.player.clips.length+1), title:el.dataset.title, date:'Today', duration:'0:'+(30+Math.floor(Math.random()*30)), note:'Recorded and saved to your personal catalogue for review.'});
      showToast(`Recorded — saved to ${track==='player' ? 'My Clips' : 'your activity log'}.`);
      render();
      break;
    }
    case 'log-milestone': {
      const m = DB.milestones.find(x=>x.id===el.dataset.id);
      DB.player.pendingMilestones.push({id:m.id, status:'pending'});
      showToast(`Submitted — high-value achievements (${m.xp.toLocaleString()} XP) are always reviewed by a league admin before XP is granted.`);
      render();
      break;
    }
    case 'approve-milestone': {
      const pending = DB.player.pendingMilestones.find(p=>p.id===el.dataset.id);
      const m = DB.milestones.find(x=>x.id===el.dataset.id);
      pending.status = 'approved';
      awardXP(m.track, m.xp);
      showToast(`Approved — "${m.title}" verified and XP granted.`);
      render();
      break;
    }
    case 'cycle-tab': state.cycleTab = el.dataset.tab; render(); break;
    case 'set-mood': state.mood = Number(el.dataset.mood); render(); showToast('Logged how you\u2019re feeling — visible to your coach in aggregate, never interrupting play.'); break;
    case 'lb-tab': state.lbTab = el.dataset.tab; render(); break;
    case 'lb-sort': state.lbSort = el.dataset.sort; render(); break;
    case 'badge-cat': state.badgeCat = el.dataset.cat; state.badgeSub = 'All'; state.badgeOpen=null; render(); break;
    case 'badge-sub': state.badgeSub = el.dataset.sub; render(); break;
    case 'toggle-badge': state.badgeOpen = state.badgeOpen === el.dataset.id ? null : el.dataset.id; render(); break;
    case 'toggle-clip': { const id='clip-'+el.dataset.id; state.badgeOpen = state.badgeOpen===id?null:id; render(); break; }
    case 'toggle-mg': { const id='mg-'+el.dataset.id; state.badgeOpen = state.badgeOpen===id?null:id; render(); break; }
    case 'play-minigame': showToast(`${el.dataset.name}: personalised analysis ready — check your improvement summary.`); break;
    case 'train-tab': state.trainTab = el.dataset.tab; render(); break;
    case 'toggle-how': state.howOpen[el.dataset.id] = !state.howOpen[el.dataset.id]; render(); break;
    case 'like-post': { const post = DB.feed.find(f=>f.id===el.dataset.id); post.likes += 1; render(); break; }
    case 'quiz-answer': {
      const q = QUIZ_QUESTIONS.find(x=>x.id===el.dataset.qid);
      const opt = q.options[Number(el.dataset.oidx)];
      Object.entries(opt.tags).forEach(([a,w]) => state.quiz.scores[a] += w);
      state.quiz.askedIds.push(q.id);
      const next = quizPickNext();
      if (next){ state.quiz.currentQ = next; } else { state.quiz.done = true; }
      render();
      break;
    }
    case 'restart-quiz': quizInit(); render(); break;
    case 'apply-archetype': {
      const labels = attrLabels();
      if (el.dataset.hybrid === '1'){
        const a = ARCHETYPES[el.dataset.arch], b = ARCHETYPES[el.dataset.archB];
        const nickname = el.dataset.nickname;
        DB.player.archetype = nickname;
        DB.player.playstyle = `A hybrid build blending ${a.name} (${a.desc}) with ${b.name} (${b.desc})`;
        const combined = [...new Set([...a.emphasize, ...b.emphasize])];
        DB.player.strengths = combined.slice(0,3).map(k=>labels[k]);
        showToast(`Archetype set to "${nickname}".`);
      } else {
        const a = ARCHETYPES[el.dataset.arch];
        DB.player.archetype = a.name;
        DB.player.playstyle = a.desc;
        DB.player.strengths = a.emphasize.slice(0,3).map(k=>labels[k]);
        showToast(`Archetype set to ${a.name}.`);
      }
      state.view = 'mycard'; render();
      break;
    }
  }
});

document.addEventListener('submit', function(e){
  const form = e.target.closest('[data-action]');
  if (!form) return;
  e.preventDefault();
  const action = form.dataset.action;
  const data = Object.fromEntries(new FormData(form).entries());

  if (action === 'prepare-cue-form'){
    state.cueWord = (data.cue||'').trim();
    state.cycleTab = 'perform';
    showToast(state.cueWord ? `Cue word set: "${state.cueWord}"` : 'Cue word cleared.');
    render();
  }
  if (action === 'reflect-form'){
    state.reflectionLog.unshift({date:'Today', j1:data.j1||'', j2:data.j2||'', j3:data.j3||''});
    awardXP('player', 15);
    state.mood = null;
    showToast('Reflection logged — carried into next session\u2019s Preparation step.');
    render();
  }
  if (action === 'create-team-form'){
    if (!data.name) return;
    DB.teams.push({id:'t'+(DB.teams.length+1), name:data.name, logo:'🆕', logoStatus:'pending', color:['#2FDD9B','#E8B84B','#E85D4A','#4AA3E8'][DB.teams.length%4], motto:data.motto||'New to the league.', court:data.court||'Court TBD', level:1, fans:10, roster:1, accolades:0});
    showToast(`${data.name} registered — logo queued for league review.`);
    render();
  }
  if (action === 'register-comp-form'){
    const comp = DB.competitions.find(c=>c.id===form.dataset.comp);
    const team = DB.teams.find(t=>t.id===data.team);
    if (comp.filled < comp.slots){ comp.filled += 1; }
    DB.player.registrations.push({comp:comp.name, format:comp.format, team:team.name});
    showToast(`Payment simulated — ${team.name} registered for ${comp.name}.`);
    render();
  }
  if (action === 'log-activity-form'){
    if (!data.witness && form.dataset.role !== 'creator'){ showToast('A confirmation name is required before XP can be granted.'); return; }
    const trackByRole = {player:'player', coach:'coach', creator:'creator', admin:'official'};
    const track = trackByRole[form.dataset.role];
    if (form.dataset.role === 'player'){
      DB.matches.unshift({id:'m'+(DB.matches.length+1), type:data.type, date:'Today', result:data.result||'—', note:`${data.pts||0} pts, ${data.ast||0} ast, ${data.reb||0} reb (${data.min||0} min) · confirmed by ${data.witness}`});
      if (Number(data.ast) > 0) DB.player.attributes.passing = Math.min(99, DB.player.attributes.passing+1);
      awardXP('player', GAME_TYPE_XP[data.type] || 40);
    } else if (form.dataset.role === 'coach'){
      DB.roleCards.coach.sessionsRun += 1;
      awardXP('coach', COACH_SESSION_XP[data.type] || 35);
    } else if (form.dataset.role === 'creator'){
      DB.roleCards.creator.highlightsProduced += 1;
      DB.feed.unshift({id:'f'+(DB.feed.length+1), name:DB.player.name, role:'Creator', avatar:'🎬', text:`New ${data.type}: ${data.notes||'check it out'}`, likes:0, comments:0});
      awardXP('creator', CREATOR_CONTENT_XP[data.type] || 30);
    } else if (form.dataset.role === 'admin'){
      DB.roleCards.official.matchesOfficiated += 1;
      awardXP('official', OFFICIATING_XP[data.type] || 35);
    }
    render();
  }
  if (action === 'new-post-form'){
    if (!data.text || !data.text.trim()) return;
    DB.feed.unshift({id:'f'+(DB.feed.length+1), name:DB.player.name, role:(ROLE_META[state.role]||ROLE_META.player).label, avatar:DB.player.photo, text:data.text.trim(), likes:0, comments:0});
    showToast('Posted to the community feed.');
    render();
  }
});

/* ---------------------------------------------------------------
   7. INIT
   --------------------------------------------------------------- */
render();
</script>
